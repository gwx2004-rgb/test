<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Green sci-fi creative background</title>
  <desc id="desc">A warm green futuristic abstract scene with luminous rings, soft grids, and floating glass forms.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff8df"/>
      <stop offset="0.42" stop-color="#b7d7ad"/>
      <stop offset="1" stop-color="#3e744d"/>
    </linearGradient>
    <radialGradient id="glow" cx="64%" cy="38%" r="42%">
      <stop offset="0" stop-color="#e8ffb8" stop-opacity="0.9"/>
      <stop offset="0.42" stop-color="#8bd66f" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#254b33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="20%" cy="18%" r="42%">
      <stop offset="0" stop-color="#ffd8a2" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffd8a2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.48" stop-color="#bff0c6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#315f45" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6f2d7" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#7faf79" stop-opacity="0.84"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#sky)"/>
  <rect width="1800" height="1100" fill="url(#warm)"/>
  <rect width="1800" height="1100" fill="url(#glow)"/>

  <g opacity="0.18" stroke="#f8ffe8" stroke-width="1">
    <path d="M0 732H1800"/>
    <path d="M0 790H1800"/>
    <path d="M0 856H1800"/>
    <path d="M0 932H1800"/>
    <path d="M0 1020H1800"/>
    <path d="M290 1100L760 620"/>
    <path d="M560 1100L900 620"/>
    <path d="M820 1100L1030 620"/>
    <path d="M1090 1100L1160 620"/>
    <path d="M1360 1100L1280 620"/>
    <path d="M1620 1100L1390 620"/>
  </g>

  <ellipse cx="1180" cy="450" rx="420" ry="150" fill="none" stroke="#efffd8" stroke-width="18" opacity="0.44"/>
  <ellipse cx="1180" cy="450" rx="300" ry="104" fill="none" stroke="#9dff85" stroke-width="5" opacity="0.58"/>
  <ellipse cx="1180" cy="450" rx="190" ry="64" fill="none" stroke="#fff3bf" stroke-width="3" opacity="0.58"/>

  <g opacity="0.52">
    <path d="M1030 238L1440 360L1328 755L910 598Z" fill="url(#glass)" stroke="#efffe4" stroke-width="2"/>
    <path d="M1325 188L1610 305L1502 650L1238 534Z" fill="url(#glass)" stroke="#efffe4" stroke-width="2"/>
    <path d="M780 332L1046 404L930 716L664 610Z" fill="url(#glass)" stroke="#efffe4" stroke-width="2"/>
  </g>

  <g filter="url(#blur)" opacity="0.54">
    <circle cx="1430" cy="260" r="88" fill="#d8ff7b"/>
    <circle cx="1076" cy="412" r="58" fill="#62e06e"/>
    <circle cx="1572" cy="622" r="70" fill="#95ffb0"/>
  </g>

  <path d="M0 730C250 678 454 716 676 742C932 772 1135 732 1388 704C1552 686 1694 692 1800 710V1100H0Z" fill="url(#floor)" opacity="0.86"/>

  <g opacity="0.62" stroke="#efffe3" stroke-width="2" fill="none">
    <path d="M1015 730C1128 650 1278 640 1425 720"/>
    <path d="M915 782C1128 675 1390 672 1585 770"/>
    <path d="M738 848C1040 700 1455 702 1740 828"/>
  </g>

  <g opacity="0.2" fill="#ffffff">

    <circle cx="545" cy="328" r="3"/>
    <circle cx="710" cy="186" r="5"/>
    <circle cx="1510" cy="160" r="4"/>
    <circle cx="1624" cy="458" r="3"/>
    <circle cx="980" cy="146" r="4"/>
  </g>
